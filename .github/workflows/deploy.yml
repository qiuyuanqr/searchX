name: Deploy site
on:
  push:
    branches: [main]
    # 只有动到站点内容才部署；纯配置/skill/自动同步提交不触发，省构建额度。
    paths:
      - 'research/**'
      - 'web/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # 随时可在 GitHub Actions 页 / `gh workflow run deploy.yml` 手动触发
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
