name: Deploy site
on:
  push:
    branches: [main]
    # 只有动到站点内容才部署；纯配置/skill/自动同步提交不触发，省构建额度。
    paths:
      - 'research/**'
      - 'web/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # 手动触发 / 补跑部署：Actions 页「Run workflow」或 `gh workflow run deploy.yml`；用于 GitHub Pages 偶发 5xx 打掉某次自动部署后重发（产物没问题、纯补一次 deploy，无需空提交）
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  # 让进行中的生产部署跑完、新的排队等它（GitHub Pages 官方推荐）。
  # 切勿设 true：两次部署时间靠近时，新 deploy 会掐断进行中的旧 deploy，
  # 若新 deploy 又恰好 build 失败 / Pages 5xx，会导致已 push 的报告一起从站点消失。
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test            # 构建检查：单测全绿才部署（含报告残留 token / 半成品目录等防护）
      - run: bun run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
