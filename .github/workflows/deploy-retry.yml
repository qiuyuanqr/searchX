# 部署失败自动重跑：Deploy site 挂了（多为 GitHub Pages 偶发 5xx，见 2026-07-03
# 巨轮智能两小时未上线事故）→ 自动重跑失败的 job，不用人工去 Actions 页补跑。
# 只重跑失败的 job（--failed）：build 已成功时产物保留，直接复用，省构建额度。
# run_attempt 上限防无限循环：自动最多补跑 2 次（attempt 1、2 失败各补一次），
# 第 3 次仍失败就停手、保持红 → GitHub 发失败邮件，说明不是偶发故障，需要人看。
name: Auto-retry deploy
on:
  workflow_run:
    workflows: ["Deploy site"]
    types: [completed]
permissions:
  actions: write
jobs:
  rerun:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Deploy site run ${{ github.event.workflow_run.id }} (attempt ${{ github.event.workflow_run.run_attempt }}) 失败，自动重跑失败的 job"
          sleep 60  # 稍等再重跑：Pages 偶发 5xx 通常几十秒内自愈，立刻重跑容易撞上同一故障
          gh run rerun ${{ github.event.workflow_run.id }} --failed --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
