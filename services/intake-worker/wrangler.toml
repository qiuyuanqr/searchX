# services/intake-worker/wrangler.toml
name = "searchx-intake"
main = "src/index.js"
compatibility_date = "2026-01-01"
workers_dev = true

# KV：限频计数 + 提交者邮箱私有记录（sub:<issue号>）
# 创建后把 id 填进来：bun x wrangler kv namespace create INTAKE_KV
[[kv_namespaces]]
binding = "INTAKE_KV"
id = "5a33a86dbf6b4a42bf72532638d90347"

[vars]
GITHUB_OWNER = "qiuyuanqr"
GITHUB_REPO = "searchX"
AUTHOR_LOGIN = "qiuyuanqr"
ALLOWED_ORIGIN = "https://qiuyuanqr.github.io"
MAX_PER_EMAIL_PER_DAY = "5"        # 每授权邮箱每日提交上限（防链接泄露后刷爆额度）
ADMIN_MAX_FAILS_PER_HOUR = "10"    # 单 IP 错误 ADMIN_KEY 尝试上限，超则临时锁定

# 机密不写这里——用 dashboard 或 `bun x wrangler secret put`：
#   GITHUB_TOKEN, SUB_READ_SECRET, ADMIN_KEY
#   （TURNSTILE_SECRET 在授权路径已不用，可保留或清理）
