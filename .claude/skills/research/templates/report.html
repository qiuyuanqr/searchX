<!doctype html>
<!--
  填充说明（Claude Code 生成报告时替换以下 {{TOKEN}}）：
  {{TITLE}}            调研对象名称
  {{TYPE}}             类型：概念 / 人物 / 方法论 / 事件 / 板块
  {{DATE}}             生成日期（北京时间，如 2026-06-02）
  {{TLDR}}             一句话核心结论（纯文本，1–2 句）
  {{KEY_FINDINGS}}     关键发现，HTML 的 <li>…</li> 列表项（3–6 条）
  {{BODY}}             正文主体，已渲染 HTML（<h2>/<h3>/<p>/<ul>；案例用 <div class="case">…；
                       提示用 <div class="callout">…）
  {{LIMITATION_BLOCK}} 局限声明区块。人物类填 <div class="limitation">…</div>；其它类型留空字符串
  {{RISKS}}            风险与争议，HTML <li>…</li>（无则填一句"暂无显著风险项"）
  {{SOURCES}}          来源清单，每条一个 <li><span class="src-tag …">类型</span> <a href>标题</a> <em>日期</em> — 摘要</li>
  {{SOURCE_COUNT}}     来源条数
  {{MASTHEAD_BOARDS}}  报头「关联板块」span。仅「股票」类型填
                       <span><b>关联板块</b> 算力 · AI应用</span>；其它类型一律填空字符串（报头不显示板块）
  说明：本文件离线自包含，不联网加载任何资源；字体用系统原生栈。
-->
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}} · 调研报告</title>
<style>
  :root{
    --paper:#f4f1ea; --paper-2:#ece7dc; --ink:#1c1a17; --ink-soft:#4a463f;
    --muted:#8a8377; --rule:#d8d2c4; --seal:#a3361f; --seal-soft:#c25a40;
    --card:#fbf9f4; --accent-bg:#efeadd;
    --measure:42rem;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#16140f; --paper-2:#1d1a14; --ink:#ece7da; --ink-soft:#b9b2a2;
      --muted:#7d766a; --rule:#332f26; --seal:#e0735a; --seal-soft:#c25a40;
      --card:#1c1913; --accent-bg:#211d15;
    }
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:"Iowan Old Style","New York",Palatino,"Palatino Linotype",Georgia,"Songti SC","Noto Serif CJK SC",serif;
    font-size:18px; line-height:1.72; letter-spacing:.005em;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .wrap{max-width:var(--measure); margin:0 auto; padding:5rem 1.5rem 7rem}
  /* 报头 */
  header.masthead{border-bottom:2px solid var(--ink); padding-bottom:1.4rem; margin-bottom:2.6rem}
  .kicker{display:flex; align-items:center; gap:.7rem; font-family:ui-sans-serif,-apple-system,"PingFang SC",sans-serif;
    font-size:.72rem; letter-spacing:.22em; text-transform:uppercase; color:var(--muted)}
  .seal{display:inline-flex; align-items:center; justify-content:center; width:1.55rem; height:1.55rem;
    border:1.5px solid var(--seal); color:var(--seal); border-radius:3px; font-size:.7rem; font-weight:700;
    letter-spacing:0; transform:rotate(-4deg)}
  h1{font-size:2.7rem; line-height:1.12; margin:.7rem 0 .2rem; font-weight:600; letter-spacing:-.01em}
  .meta{font-family:ui-sans-serif,-apple-system,"PingFang SC",sans-serif; font-size:.82rem;
    color:var(--muted); display:flex; flex-wrap:wrap; gap:.4rem 1.1rem; margin-top:.6rem}
  .meta b{color:var(--ink-soft); font-weight:600}
  /* TL;DR */
  .tldr{background:var(--accent-bg); border-left:3px solid var(--seal); padding:1.1rem 1.3rem;
    margin:0 0 2.6rem; font-size:1.05rem; color:var(--ink)}
  .tldr .lbl{font-family:ui-sans-serif,-apple-system,"PingFang SC",sans-serif; font-size:.7rem;
    letter-spacing:.18em; text-transform:uppercase; color:var(--seal); display:block; margin-bottom:.35rem}
  /* 关键发现 */
  .findings{background:var(--card); border:1px solid var(--rule); border-radius:6px; padding:1.3rem 1.5rem 1.3rem 1.4rem; margin-bottom:3rem}
  .findings h2{margin:.1rem 0 .7rem; font-size:1.05rem; font-family:ui-sans-serif,-apple-system,"PingFang SC",sans-serif;
    letter-spacing:.04em; color:var(--ink-soft)}
  .findings ul{margin:0; padding-left:1.15rem}
  .findings li{margin:.45rem 0; line-height:1.6}
  /* 正文 */
  main h2{font-size:1.55rem; margin:3rem 0 .8rem; padding-top:1.3rem; border-top:1px solid var(--rule); font-weight:600; letter-spacing:-.005em}
  main h2:first-child{border-top:none; padding-top:0; margin-top:0}
  main h3{font-size:1.18rem; margin:1.8rem 0 .5rem; color:var(--ink-soft); font-weight:600}
  main p{margin:.9rem 0}
  main ul,main ol{padding-left:1.3rem}
  main li{margin:.4rem 0}
  a{color:var(--seal); text-underline-offset:2px; text-decoration-thickness:1px}
  a:hover{color:var(--seal-soft)}
  strong{font-weight:600}
  /* 案例块 */
  .case{background:var(--paper-2); border-radius:6px; padding:1rem 1.25rem; margin:1.2rem 0; border:1px solid var(--rule)}
  .case::before{content:"案例"; display:inline-block; font-family:ui-sans-serif,-apple-system,"PingFang SC",sans-serif;
    font-size:.66rem; letter-spacing:.16em; text-transform:uppercase; color:var(--seal); margin-bottom:.4rem}
  .case p:first-of-type{margin-top:0}
  .case p:last-child{margin-bottom:0}
  /* 通用提示 */
  .callout{border-left:3px solid var(--seal-soft); padding:.3rem 0 .3rem 1.1rem; margin:1.3rem 0; color:var(--ink-soft); font-style:italic}
  /* 局限声明 */
  .limitation{background:var(--accent-bg); border:1px dashed var(--seal-soft); border-radius:6px;
    padding:.9rem 1.2rem; margin:1.6rem 0; font-size:.92rem; color:var(--ink-soft)}
  .limitation::before{content:"⚠ 数据局限"; display:block; font-family:ui-sans-serif,-apple-system,"PingFang SC",sans-serif;
    font-size:.68rem; letter-spacing:.14em; color:var(--seal); margin-bottom:.35rem; font-style:normal}
  /* 风险 */
  section.risks{margin-top:3rem; padding-top:1.3rem; border-top:1px solid var(--rule)}
  section.risks h2{font-size:1.3rem; margin:0 0 .6rem}
  /* 来源 */
  section.sources{margin-top:3.5rem; padding-top:1.4rem; border-top:2px solid var(--ink)}
  section.sources h2{font-size:1.1rem; font-family:ui-sans-serif,-apple-system,"PingFang SC",sans-serif; letter-spacing:.04em; margin:0 0 1rem}
  section.sources ol{list-style:none; counter-reset:s; padding:0; margin:0; font-size:.9rem}
  section.sources li{counter-increment:s; padding:.55rem 0 .55rem 2.1rem; position:relative; border-bottom:1px solid var(--rule); line-height:1.5}
  section.sources li::before{content:counter(s); position:absolute; left:0; top:.55rem; font-family:ui-sans-serif,sans-serif;
    font-size:.72rem; color:var(--muted); width:1.5rem; text-align:right}
  .src-tag{display:inline-block; font-family:ui-sans-serif,-apple-system,sans-serif; font-size:.64rem; letter-spacing:.08em;
    padding:.08rem .4rem; border-radius:3px; margin-right:.5rem; vertical-align:.08em; font-style:normal}
  .src-reg{background:#1f5130;color:#eafff0} .src-disc{background:#27406b;color:#e9f0ff}
  .src-media{background:#6b4a1f;color:#fff4e3} .src-research{background:#4a2c6b;color:#f3e9ff}
  .src-comm{background:#5a554a;color:#f2efe8}
  section.sources em{color:var(--muted); font-style:normal; font-size:.82rem; margin:0 .3rem}
  footer{margin-top:4rem; text-align:center; font-family:ui-sans-serif,sans-serif; font-size:.74rem; color:var(--muted); letter-spacing:.04em}
  @media (max-width:560px){ body{font-size:17px} h1{font-size:2.1rem} .wrap{padding:3rem 1.1rem 5rem} }
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <div class="kicker"><span class="seal">研</span> 深度调研 · {{TYPE}}</div>
    <h1>{{TITLE}}</h1>
    <div class="meta">
      <span><b>生成</b> {{DATE}}（北京时间）</span>
      <span><b>类型</b> {{TYPE}}</span>
      {{MASTHEAD_BOARDS}}
      <span><b>来源</b> {{SOURCE_COUNT}} 条</span>
    </div>
  </header>

  <div class="tldr">
    <span class="lbl">核心结论</span>
    {{TLDR}}
  </div>

  <div class="findings">
    <h2>关键发现</h2>
    <ul>
      {{KEY_FINDINGS}}
    </ul>
  </div>

  <main>
    {{BODY}}
    {{LIMITATION_BLOCK}}
  </main>

  <section class="risks">
    <h2>风险与争议</h2>
    <ul>
      {{RISKS}}
    </ul>
  </section>

  <section class="sources">
    <h2>来源清单（按可信度优先级排序）</h2>
    <ol>
      {{SOURCES}}
    </ol>
  </section>

  <footer>
    searchX · 调研于 {{DATE}} · 内容定格于生成时点，更新请重跑生成新版本
  </footer>

</div>
</body>
</html>
