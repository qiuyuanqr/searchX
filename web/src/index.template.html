<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer"><!-- 专属链接 ?k= 不随 referer 外泄 -->
<title>searchX · 调研档案</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="stylesheet" href="assets/feed.css">
</head>
<body data-pagefind-ignore>
  <div class="wrap">
    <header>
      <div class="kicker">
        <span class="seal">研</span> 深度调研引擎<span class="kicker-en"> · DEEP RESEARCH</span>
        <button type="button" class="submit-link" id="open-submit" aria-haspopup="dialog" aria-controls="submit-modal" aria-expanded="false">+ 提交调研请求</button>
      </div>
      <h1 class="brand">searchX · 调研档案</h1>
    </header>
    <!-- 筛选区必须是 .wrap 的直接子元素：sticky 只能在父容器内生效，留在 header 里会随 header 一起滚走 -->
    <div class="filterbar">
      <div class="search-wrap">
        <input id="q" class="search" placeholder="搜索题目、结论、标签…" aria-label="搜索题目、结论、标签" autocomplete="off">
        <button type="button" class="search-clear" id="q-clear" aria-label="清空搜索" hidden>✕</button>
      </div>
      <div class="chips" id="chips-type" data-group="type">
        <span class="chip on" data-filter="all" role="button" tabindex="0" aria-pressed="true">全部</span>
        <span class="chip" data-filter="type:概念" role="button" tabindex="0" aria-pressed="false">概念</span>
        <span class="chip" data-filter="type:人物" role="button" tabindex="0" aria-pressed="false">人物</span>
        <span class="chip" data-filter="type:方法论" role="button" tabindex="0" aria-pressed="false">方法论</span>
        <span class="chip" data-filter="type:事件" role="button" tabindex="0" aria-pressed="false">事件</span>
        <span class="chip" data-filter="type:股票" role="button" tabindex="0" aria-pressed="false">股票</span>
      </div>
      <div class="count" id="count" aria-live="polite"></div>
    </div>

    <ul class="article-list" id="feed"><!-- CARDS --></ul>
    <div id="results" class="results" hidden></div>
    <div id="empty" class="empty" hidden>没有匹配的条目。</div>
  </div>

  <!-- 右下角浮动操作：刷新（常驻）+ 回到顶部（滚动后浮现、叠在刷新上方）-->
  <button class="to-refresh" aria-label="刷新页面" title="刷新">↻</button>
  <button class="to-top" aria-label="回到顶部" title="回到顶部">↑</button>

  <!-- 提交调研请求弹窗（入口在首页内，不再跳独立网址） -->
  <div class="modal-backdrop" id="submit-modal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="submit-modal-title">
      <button type="button" class="modal-close" id="close-submit" aria-label="关闭">✕</button>
      <div class="kicker"><span class="seal">研</span> 提交调研请求</div>
      <h2 class="modal-title" id="submit-modal-title">提交一个调研请求</h2>
      <p class="modal-lead">说清你想搞懂的对象（概念 / 人物 / 方法论 / 事件）。提交后系统自动开始调研，结果发到你专属链接对应的邮箱。</p>
      <p class="modal-hint">📈 想分析单只股票？直接填名字或代码（例：宁德时代 300750 / NVDA），自动按「股票深度分析」处理。</p>

      <form id="submit-form" class="submit-form" data-worker="{{WORKER_URL}}" data-worker-fallback="{{WORKER_FALLBACK_URL}}" data-verify="{{WORKER_URL}}/verify" autocomplete="off">
        <p id="auth-state" class="modal-hint" role="status" aria-live="polite" hidden></p>
        <label class="field">
          <span class="field-label">题目 <em>*</em></span>
          <input class="search" type="text" name="title" maxlength="160" required
                 placeholder="例如：稳定币的清结算机制">
        </label>
        <p id="dup-notice" class="dup-notice" role="status" aria-live="polite" hidden></p>
        <label class="field">
          <span class="field-label">侧重点（可选）</span>
          <textarea class="search ta" name="focus" maxlength="500" rows="2"
                    placeholder="想重点了解的角度、想回答的具体问题…"></textarea>
        </label>
        <label class="field">
          <span class="field-label">留言（可选）</span>
          <textarea class="search ta" name="message" maxlength="1000" rows="2"
                    placeholder="想对作者说的话…"></textarea>
        </label>

        <button class="submit-btn" type="submit">提交请求</button>
        <p id="form-status" class="form-status" role="status" aria-live="polite" hidden></p>
        <p class="fineprint">结果会发到你专属链接对应的邮箱，不会出现在公开页面上。</p>
      </form>

      <div id="submit-done" class="submit-done" role="status" aria-live="polite" hidden>
        <div class="done-seal">✓</div>
        <h2 class="done-title">已提交</h2>
        <p class="done-text">系统会自动开始调研，研究结果会发到你专属链接对应的邮箱，并出现在下面的调研档案里。</p>
        <p class="done-sub"><button type="button" class="linklike" id="submit-again">再提一个 →</button></p>
      </div>
    </div>
  </div>

  <script type="module" src="assets/feed.js"></script>
</body>
</html>
