<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>searchX · 调研档案</title>
<link rel="stylesheet" href="assets/feed.css">
</head>
<body data-pagefind-ignore>
  <div class="wrap">
    <header>
      <div class="kicker"><span class="seal">研</span> 深度调研引擎 · DEEP RESEARCH</div>
      <h1 class="brand">searchX · 调研档案</h1>
      <div class="search-wrap"><input id="q" class="search" placeholder="搜索题目、结论、标签…" autocomplete="off"></div>
      <div class="chips" id="chips">
        <span class="chip on" data-filter="all">全部</span>
        <span class="chip" data-filter="type:概念">概念</span>
        <span class="chip" data-filter="type:人物">人物</span>
        <span class="chip" data-filter="type:方法论">方法论</span>
        <span class="chip" data-filter="type:事件">事件</span>
      </div>
      <div class="rule-grad"></div>
    </header>

    <ul class="article-list" id="feed"><!-- CARDS --></ul>
    <div id="results" class="results" hidden></div>
    <div id="empty" class="empty" hidden>没有匹配的条目。</div>
  </div>

  <button class="to-top" aria-label="回到顶部" title="回到顶部">↑</button>
  <script type="module" src="assets/feed.js"></script>
</body>
</html>
