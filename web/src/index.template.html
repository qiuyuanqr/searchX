<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>searchX · 调研档案</title>
<link rel="stylesheet" href="assets/feed.css">
<script>
  // Turnstile 显式渲染：API 就绪后回调，实际渲染交给 feed.js（避免在 display:none 弹窗里 0 尺寸渲染）
  window.onTurnstileReady = function () {
    window.__turnstileReady = true;
    if (typeof window.__renderTurnstile === "function") window.__renderTurnstile();
  };
</script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileReady&render=explicit" async defer></script>
</head>
<body data-pagefind-ignore>
  <div class="wrap">
    <header>
      <div class="kicker">
        <span class="seal">研</span> 深度调研引擎 · DEEP RESEARCH
        <button type="button" class="submit-link" id="open-submit" aria-haspopup="dialog" aria-controls="submit-modal" aria-expanded="false">+ 提交调研请求</button>
      </div>
      <h1 class="brand">searchX · 调研档案</h1>
      <div class="search-wrap"><input id="q" class="search" placeholder="搜索题目、结论、标签…" autocomplete="off"></div>
      <div class="chips" id="chips">
        <span class="chip on" data-filter="all">全部</span>
        <span class="chip" data-filter="type:概念">概念</span>
        <span class="chip" data-filter="type:人物">人物</span>
        <span class="chip" data-filter="type:方法论">方法论</span>
        <span class="chip" data-filter="type:事件">事件</span>
      </div>
      <div class="rule-grad"></div>
    </header>

    <ul class="article-list" id="feed"><!-- CARDS --></ul>
    <div id="results" class="results" hidden></div>
    <div id="empty" class="empty" hidden>没有匹配的条目。</div>
  </div>

  <button class="to-top" aria-label="回到顶部" title="回到顶部">↑</button>

  <!-- 提交调研请求弹窗（入口在首页内，不再跳独立网址） -->
  <div class="modal-backdrop" id="submit-modal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="submit-modal-title">
      <button type="button" class="modal-close" id="close-submit" aria-label="关闭">✕</button>
      <div class="kicker"><span class="seal">研</span> 提交调研请求</div>
      <h2 class="modal-title" id="submit-modal-title">提交一个调研请求</h2>
      <p class="modal-lead">说清你想搞懂的对象（一个概念 / 一个人物 / 一种方法论 / 一个事件）。作者审核通过后会自动跑研究，结果会发到你留的邮箱，并出现在下面的调研档案里。</p>

      <form id="submit-form" class="submit-form" data-worker="{{WORKER_URL}}" autocomplete="off">
        <label class="field">
          <span class="field-label">题目 <em>*</em></span>
          <input class="search" type="text" name="title" maxlength="160" required
                 placeholder="例如：稳定币的清结算机制">
        </label>
        <label class="field">
          <span class="field-label">侧重点（可选）</span>
          <textarea class="search ta" name="focus" maxlength="500" rows="3"
                    placeholder="想重点了解的角度、想回答的具体问题…"></textarea>
        </label>
        <label class="field">
          <span class="field-label">你的邮箱 <em>*</em></span>
          <input class="search" type="email" name="email" maxlength="254" required
                 placeholder="结果发到这里（不会公开）">
        </label>
        <label class="field">
          <span class="field-label">留言（可选）</span>
          <textarea class="search ta" name="message" maxlength="1000" rows="2"
                    placeholder="想对作者说的话…"></textarea>
        </label>

        <div id="ts-widget" class="ts-widget" data-sitekey="{{TURNSTILE_SITE_KEY}}"></div>

        <button class="submit-btn" type="submit">提交请求</button>
        <p id="form-status" class="form-status" role="status" aria-live="polite" hidden></p>
        <p class="fineprint">邮箱仅用于把结果发给你，不会出现在公开页面上。</p>
      </form>

      <div id="submit-done" class="submit-done" role="status" aria-live="polite" hidden>
        <div class="done-seal">✓</div>
        <h2 class="done-title">已提交</h2>
        <p class="done-text">作者会尽快审核。审核通过后，研究结果会发到你留的邮箱，并出现在下面的调研档案里。</p>
        <p class="done-sub"><button type="button" class="linklike" id="submit-again">再提一个 →</button></p>
      </div>
    </div>
  </div>

  <script type="module" src="assets/feed.js"></script>
</body>
</html>
