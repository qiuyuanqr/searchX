<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<meta name="referrer" content="no-referrer">
<!-- 严格 CSP：脚本只许同源（无 'unsafe-inline'，故脚本外置）；外联只许同源 + Worker。
     即使页面被注入标记也无法执行新脚本、无法把 ADMIN_KEY 外发到攻击者域名。 -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' {{WORKER_URL}}; base-uri 'none'; form-action 'none'">
<title>searchX · 授权管理</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="assets/feed.css">
</head>
<body data-pagefind-ignore data-worker="{{WORKER_URL}}">
  <div class="wrap">
    <header>
      <div class="kicker"><span class="seal">研</span> 授权管理 · ADMIN</div>
      <h1 class="brand">授权管理</h1>
    </header>

    <!-- 密钥闸：输对 ADMIN_KEY 之前只显示这个，面板与数据都不加载 -->
    <div id="gate">
      <p class="modal-lead">输入管理密钥进入。只有持密钥的你能管理授权名单。</p>
      <label class="field">
        <span class="field-label">管理密钥</span>
        <input id="admin-key" class="search" type="password" autocomplete="off" placeholder="ADMIN_KEY">
      </label>
      <button id="enter" class="submit-btn" type="button">进入</button>
      <p id="gate-msg" class="form-status" role="status" aria-live="polite" hidden></p>
    </div>

    <!-- 管理面板：加人 / 列表 / 复制链接 / 撤销 -->
    <div id="panel" hidden>
      <form id="add-form" class="submit-form">
        <label class="field">
          <span class="field-label">加一个授权邮箱</span>
          <input id="add-email" class="search" type="email" autocomplete="off" placeholder="friend@example.com">
        </label>
        <button class="submit-btn" type="submit">生成专属链接</button>
        <p id="add-msg" class="form-status" role="status" aria-live="polite" hidden></p>
      </form>
      <p class="modal-hint">把生成的「专属链接」私发给本人（微信/私聊都行）。他用链接打开站点即可提交，系统自动跑。撤销后该链接立即失效。</p>
      <table class="people"><thead><tr><th>邮箱</th><th>专属链接</th><th>操作</th></tr></thead><tbody id="people"></tbody></table>
      <p class="modal-hint"><button type="button" class="linklike" id="logout">退出（清除本机密钥）</button></p>
    </div>
  </div>

  <!-- 外置脚本（配合 script-src 'self'）：DOM 引导在 assets/admin-page.js，纯逻辑在 assets/admin.js -->
  <script type="module" src="assets/admin-page.js"></script>
</body>
</html>
